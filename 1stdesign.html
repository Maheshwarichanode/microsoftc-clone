<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pikachu UI</title>

  <link rel="stylesheet" href="style1.css"/>

  
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="style1sheet"
  />
</head>

<body>

  <div class="main">

    
    <div class="left">

      <img
        class="logo"
        src="https://1000logos.net/wp-content/uploads/2017/05/Pokemon-Logo.png"
        alt=""
      />

      <h4>POKEMON GEN I</h4>

      <h1>Pikachu</h1>

      <p>
        Pikachu is an Electric-type Pokémon introduced
        in Generation I. Pikachu are small, chubby,
        and incredibly cute mouse-like Pokémon.
        They are almost completely covered by
        yellow fur.
      </p>

      

      <div class="circle"></div>

    </div>

    <div class="right">

      <i class="ri-menu-3-line menu"></i>

      <img src="picachu.imp.jpg" alt="">

      <div class="dots">
        <div class="dot black"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>

  </div>

</body>
</html>
